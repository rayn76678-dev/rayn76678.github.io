<script>


let params =
new URLSearchParams(location.search);



let name =
params.get("name");



let desc={


GIS:
"Geoinformation Science",


CS:
"Programming and Computing",


German:
"German Language Learning",


IELTS:
"Academic English"


};



document
.getElementById("spaceName")
.innerHTML=name;



document
.getElementById("spaceDesc")
.innerHTML=
desc[name]
||
"Personal Knowledge Space";







function openManager(type){


location.href=

"manager.html?space="
+
name
+
"&type="
+
type;


}



</script>
